name: Build

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        shell: cmd
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DwxUSE_LIBTIFF=OFF

      - name: Build
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: fateInjector-windows-exe
          path: build/Release/fateInjector.exe
